version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: resume-ai-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./Backend
    container_name: resume-ai-backend
    ports:
      - "3000:3000"
    env_file:
      - ./Backend/.env
    depends_on:
      - mongo

  frontend:
    build: ./Frontend
    container_name: resume-ai-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo-data: